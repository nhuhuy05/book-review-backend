server:
  port: 8080
  servlet:
    context-path: /book-review

spring:
  application:
    name: haibazo-round-2
  datasource:
    url: jdbc:postgresql://localhost:5432/book-review
    username: postgres
    password: 123456
  jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect