server:
  port: ${PORT:8080}

spring:
  application:
    name: haibazo-round-2
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:book-review}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:123456}
  jpa:
    hibernate:
#      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
